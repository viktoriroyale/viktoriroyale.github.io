<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Nástěnka - Mobilní Zobrazení</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #18103a;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .container {
      width: 100vw;
      max-width: 430px;
      box-sizing: border-box;
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    img {
      width: 100%;
      height: auto;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.2);
      display: block;
    }
    .new-section {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100vh;
      background: #18103a;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      box-sizing: border-box;
      overflow: hidden;
      transform: translateY(100%);
      transition: transform 0.5s ease-in-out;
      z-index: 10;
    }
    .new-section.show {
      transform: translateY(0);
    }
    .new-section img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }
    .datetime-header {
      position: absolute;
      top: 11%;
      left: 0;
      right: 0;
      background: transparent;
      color: #ffffff;
      padding: 0;
      border-radius: 0;
      font-size: 14px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      text-align: right;
      z-index: 12;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      height: 13%;
      padding-right: 30px;
    }
    .back-arrow {
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <div style="position:relative;width:100%;max-width:400px;margin:auto;">
      <img src="https://raw.githubusercontent.com/viktoriroyale/hostovanifotekaostatnichveci/refs/heads/main/IMG_0905.png" alt="Nástěnka aplikace" style="width:100%;border-radius:16px;box-shadow:0 4px 24px rgba(0,0,0,0.2);display:block;" />
      <a href="#" onclick="showNewSection()" style="position:absolute;top:13%;left:5%;width:90%;height:13%;z-index:2;display:block;cursor:pointer;"></a>
    </div>
    <div id="new-section" class="new-section">
      <div style="position:relative;width:100%;max-width:430px;display:flex;justify-content:center;align-items:center;">
        <div class="datetime-header">
          <span id="datetime-display">18-03-2026 | 18:25:57</span>
        </div>
        <img src="https://raw.githubusercontent.com/viktoriroyale/hostovanifotekaostatnichveci/refs/heads/main/New%20Project.jpg" alt="New Image" style="width:100%;height:auto;object-fit:contain;" />
        <img src="https://raw.githubusercontent.com/viktoriroyale/hostovanifotekaostatnichveci/refs/heads/main/ezgif-265157ddb9ad46c2.gif" alt="Overlay GIF" style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:19%;height:auto;object-fit:contain;z-index:11;" />
      </div>
    </div>
  </div>
  <script>
    function showNewSection() {
      document.getElementById('new-section').classList.add('show');
      updateDateTime();
      setInterval(updateDateTime, 1000);
    }
    
    function hideNewSection() {
      document.getElementById('new-section').classList.remove('show');
    }
    
    function updateDateTime() {
      const now = new Date();
      const day = String(now.getDate()).padStart(2, '0');
      const month = String(now.getMonth() + 1).padStart(2, '0');
      const year = now.getFullYear();
      const hours = String(now.getHours()).padStart(2, '0');
      const minutes = String(now.getMinutes()).padStart(2, '0');
      const seconds = String(now.getSeconds()).padStart(2, '0');
      
      const dateTimeString = `${day}-${month}-${year} | ${hours}:${minutes}:${seconds}`;
      document.getElementById('datetime-display').textContent = dateTimeString;
    }
  </script>
</body>
</html>
